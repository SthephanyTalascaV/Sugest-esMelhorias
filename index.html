<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nibo CS Auditor — Hub dos Coordenadores</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; color: #0f172a; }
  .glass { background: white; border: 1px solid #e2e8f0; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
  .tab-btn { transition: all .2s; }
  .tab-btn.active { background: #002d72; color: white; }
  .kanban-col { min-height: 200px; }
  .card-item { transition: all .2s; }
  .card-item:hover { transform: translateY(-2px); box-shadow: 0 8px 16px -4px rgba(0,0,0,0.1); }
  .prompt-row { transition: all .2s; }
  .prompt-row:hover { border-color: #93c5fd; }
  .log-entry:not(:last-child) { border-bottom: 1px solid #f1f5f9; }
  @keyframes fadeIn { from { opacity:0; transform:scale(.97); } to { opacity:1; transform:scale(1); } }
  .modal-box { animation: fadeIn .15s ease; }
  .badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 99px; }
  select { background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat:no-repeat; background-position:right .5rem center; background-size:1.2em; padding-right:2.2rem; }
  .spinner { width:20px; height:20px; border:2px solid #e2e8f0; border-top-color:#002d72; border-radius:50%; animation:spin .6s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body class="min-h-screen pb-16">

<!-- NAV -->
<nav class="bg-[#002d72] text-white px-6 py-4 sticky top-0 z-40 shadow-xl">
  <div class="max-w-6xl mx-auto flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="bg-white p-2 rounded-xl">
        <i data-lucide="bot" class="text-[#002d72] w-5 h-5"></i>
      </div>
      <div>
        <div class="font-extrabold text-sm uppercase tracking-tight">Nibo <span class="text-blue-300">CS Auditor</span></div>
        <div class="text-[9px] text-blue-200 uppercase tracking-widest">Hub dos Coordenadores</div>
      </div>
    </div>
    <div id="user-info" class="flex items-center gap-2 text-sm text-blue-200">
      <div class="spinner" id="user-spinner"></div>
      <span id="user-name"></span>
    </div>
  </div>
</nav>

<main class="max-w-6xl mx-auto px-4 mt-6">

  <!-- TABS -->
  <div class="flex gap-2 mb-6 bg-white rounded-2xl p-1.5 border border-slate-200 w-fit shadow-sm">
    <button id="tab-roadmap" class="tab-btn active px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2" onclick="switchTab('roadmap')">
      <i data-lucide="kanban" class="w-4 h-4"></i> Roadmap & Feedbacks
    </button>
    <button id="tab-prompts" class="tab-btn px-5 py-2.5 rounded-xl text-sm font-bold text-slate-500 flex items-center gap-2" onclick="switchTab('prompts')">
      <i data-lucide="brain" class="w-4 h-4"></i> Prompts de Avaliação
    </button>
    <button id="tab-logs" class="tab-btn px-5 py-2.5 rounded-xl text-sm font-bold text-slate-500 flex items-center gap-2" onclick="switchTab('logs')">
      <i data-lucide="history" class="w-4 h-4"></i> Histórico
    </button>
  </div>

  <!-- ── TAB ROADMAP ── -->
  <div id="section-roadmap">
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-extrabold text-lg text-slate-800">Roadmap & Feedbacks</h2>
      <button onclick="openCardModal()" class="flex items-center gap-2 bg-[#002d72] hover:bg-blue-800 text-white px-4 py-2.5 rounded-xl text-sm font-bold transition-all active:scale-95">
        <i data-lucide="plus" class="w-4 h-4"></i> Novo item
      </button>
    </div>

    <div id="kanban-loading" class="flex justify-center py-16"><div class="spinner"></div></div>

    <div id="kanban-board" class="hidden grid grid-cols-1 md:grid-cols-4 gap-4">
      <!-- colunas renderizadas via JS -->
    </div>
  </div>

  <!-- ── TAB PROMPTS ── -->
  <div id="section-prompts" class="hidden">
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-extrabold text-lg text-slate-800">Prompts de Avaliação</h2>
      <button onclick="openPromptModal()" class="flex items-center gap-2 bg-[#002d72] hover:bg-blue-800 text-white px-4 py-2.5 rounded-xl text-sm font-bold transition-all active:scale-95">
        <i data-lucide="plus" class="w-4 h-4"></i> Novo prompt
      </button>
    </div>
    <div id="prompts-loading" class="flex justify-center py-16"><div class="spinner"></div></div>
    <div id="prompts-list" class="hidden space-y-3"></div>
  </div>

  <!-- ── TAB LOGS ── -->
  <div id="section-logs" class="hidden">
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-extrabold text-lg text-slate-800">Histórico de Alterações</h2>
      <select id="log-filter" onchange="filterLogs()" class="text-sm border border-slate-200 rounded-xl px-3 py-2 bg-white focus:outline-none focus:ring-2 ring-blue-300">
        <option value="todos">Todos</option>
        <option value="roadmap">Roadmap</option>
        <option value="prompt">Prompts</option>
      </select>
    </div>
    <div id="logs-loading" class="flex justify-center py-16"><div class="spinner"></div></div>
    <div id="logs-list" class="hidden glass overflow-hidden"></div>
  </div>

</main>

<!-- ══ MODAL: NOVO/EDITAR CARD ══ -->
<div id="card-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/40 backdrop-blur-sm">
  <div class="modal-box glass p-8 w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto">
    <div class="flex justify-between items-center mb-6">
      <h3 id="card-modal-title" class="font-extrabold text-lg text-[#002d72]">Novo item</h3>
      <button onclick="closeCardModal()" class="p-2 hover:bg-slate-100 rounded-full"><i data-lucide="x" class="w-4 h-4"></i></button>
    </div>
    <div class="space-y-4">
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">Título *</label>
        <input id="c-title" type="text" placeholder="Descreva o item..." class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 ring-blue-300">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">Tipo *</label>
          <select id="c-tipo" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none focus:ring-2 ring-blue-300 appearance-none">
            <option value="bug">🐛 Bug</option>
            <option value="sugestao">💡 Sugestão de Melhoria</option>
            <option value="feature">✨ Nova Funcionalidade</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">Status</label>
          <select id="c-status" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none focus:ring-2 ring-blue-300 appearance-none">
            <option value="sugerido">📥 Sugerido</option>
            <option value="mapeamento">🔍 Em Mapeamento</option>
            <option value="andamento">🔨 Em Andamento</option>
            <option value="concluido">✅ Concluído</option>
          </select>
        </div>
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">Responsável pela entrega</label>
        <input id="c-responsavel" type="text" placeholder="Nome de quem vai implementar..." class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 ring-blue-300">
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">Previsão de entrega</label>
        <input id="c-previsao" type="date" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 ring-blue-300">
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">Descrição</label>
        <textarea id="c-desc" rows="3" placeholder="Contexto adicional, passos para reproduzir, etc..." class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 ring-blue-300 resize-none"></textarea>
      </div>
    </div>
    <div class="flex justify-end gap-3 mt-6">
      <button onclick="closeCardModal()" class="px-4 py-2.5 border border-slate-200 rounded-xl text-sm font-bold text-slate-500 hover:bg-slate-50 transition-all">Cancelar</button>
      <button onclick="saveCard()" id="save-card-btn" class="flex items-center gap-2 bg-[#002d72] hover:bg-blue-800 text-white px-6 py-2.5 rounded-xl text-sm font-bold transition-all active:scale-95">
        <span id="save-card-txt">Salvar</span>
      </button>
    </div>
  </div>
</div>

<!-- ══ MODAL: NOVO/EDITAR PROMPT ══ -->
<div id="prompt-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/40 backdrop-blur-sm">
  <div class="modal-box glass p-8 w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto">
    <div class="flex justify-between items-center mb-6">
      <h3 id="prompt-modal-title" class="font-extrabold text-lg text-[#002d72]">Novo prompt</h3>
      <button onclick="closePromptModal()" class="p-2 hover:bg-slate-100 rounded-full"><i data-lucide="x" class="w-4 h-4"></i></button>
    </div>
    <div class="space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">Nome *</label>
          <input id="p-nome" type="text" placeholder="Ex: Instrução de tom de voz" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 ring-blue-300">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">Chave técnica *</label>
          <input id="p-chave" type="text" placeholder="Ex: instrucao_tom_voz" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm font-mono focus:outline-none focus:ring-2 ring-blue-300">
        </div>
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">Descrição</label>
        <input id="p-desc" type="text" placeholder="Para que serve este prompt..." class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 ring-blue-300">
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">Conteúdo do Prompt *</label>
        <textarea id="p-conteudo" rows="6" placeholder="Texto completo que será enviado ao Gemini..." class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 ring-blue-300 resize-none font-mono text-xs"></textarea>
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">Status</label>
        <select id="p-status" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none focus:ring-2 ring-blue-300 appearance-none">
          <option value="ativo">✅ Ativo</option>
          <option value="teste">🧪 Em Teste</option>
          <option value="inativo">🚫 Inativo</option>
        </select>
      </div>
    </div>
    <div class="flex justify-end gap-3 mt-6">
      <button onclick="closePromptModal()" class="px-4 py-2.5 border border-slate-200 rounded-xl text-sm font-bold text-slate-500 hover:bg-slate-50 transition-all">Cancelar</button>
      <button onclick="savePrompt()" id="save-prompt-btn" class="flex items-center gap-2 bg-[#002d72] hover:bg-blue-800 text-white px-6 py-2.5 rounded-xl text-sm font-bold transition-all active:scale-95">
        <span id="save-prompt-txt">Salvar</span>
      </button>
    </div>
  </div>
</div>

<!-- ══ FIREBASE SDK ══ -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc,
  query, orderBy, serverTimestamp, onSnapshot
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:            "AIzaSyBkC8n5mzSPZnHwXf5d-jNdZvy-esPkD8Q",
  authDomain:        "gen-lang-client-0237314662.firebaseapp.com",
  projectId:         "gen-lang-client-0237314662",
  storageBucket:     "gen-lang-client-0237314662.firebasestorage.app",
  messagingSenderId: "279936452839",
  appId:             "1:279936452839:web:8a7e6824724c49388eba42"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ─── Sessão ─────────────────────────────────────────────────────────────────
let currentUser = { name: 'Anônimo', email: '' };

async function loadSession() {
  try {
    const r = await fetch('/api/me');
    if (r.ok) {
      const s = await r.json();
      currentUser = { name: s.name || s.email, email: s.email };
      document.getElementById('user-name').textContent = s.name || s.email;
    }
  } catch {}
  document.getElementById('user-spinner').style.display = 'none';
}

// ─── Log helper ─────────────────────────────────────────────────────────────
async function addLog(tipo, acao, itemId, itemTitulo, campo, anterior, novo) {
  await addDoc(collection(db, 'hub_logs'), {
    tipo, acao, itemId, itemTitulo,
    campo: campo || null,
    anterior: anterior || null,
    novo: novo || null,
    feito_por: currentUser.name,
    feito_por_email: currentUser.email,
    feito_em: serverTimestamp()
  });
}

// ─── Constantes de UI ────────────────────────────────────────────────────────
const COLS = [
  { id: 'sugerido',   label: '📥 Sugerido',      color: 'bg-slate-100 text-slate-600' },
  { id: 'mapeamento', label: '🔍 Em Mapeamento',  color: 'bg-amber-100 text-amber-700' },
  { id: 'andamento',  label: '🔨 Em Andamento',   color: 'bg-blue-100 text-blue-700'  },
  { id: 'concluido',  label: '✅ Concluído',       color: 'bg-emerald-100 text-emerald-700' },
];

const TIPO_BADGE = {
  bug:      'bg-red-100 text-red-700',
  sugestao: 'bg-blue-100 text-blue-700',
  feature:  'bg-purple-100 text-purple-700',
};
const TIPO_LABEL = { bug: '🐛 Bug', sugestao: '💡 Sugestão', feature: '✨ Feature' };

const STATUS_BADGE = {
  ativo:   'bg-emerald-100 text-emerald-700',
  teste:   'bg-amber-100 text-amber-700',
  inativo: 'bg-red-100 text-red-700',
};
const STATUS_LABEL = { ativo: '✅ Ativo', teste: '🧪 Em Teste', inativo: '🚫 Inativo' };

// ─── KANBAN ──────────────────────────────────────────────────────────────────
let allCards = [];
let editingCardId = null;

function renderKanban() {
  const board = document.getElementById('kanban-board');
  board.innerHTML = COLS.map(col => {
    const cards = allCards.filter(c => c.status === col.id);
    return `
    <div class="glass p-4">
      <div class="flex items-center justify-between mb-3">
        <span class="text-xs font-black uppercase tracking-wider text-slate-500">${col.label.replace(/^[^\s]+\s/, '')}</span>
        <span class="badge ${col.color}">${cards.length}</span>
      </div>
      <div class="space-y-3 kanban-col">
        ${cards.map(c => `
        <div class="card-item bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
          <div class="flex items-start justify-between gap-2 mb-2">
            <p class="text-sm font-semibold text-slate-800 leading-snug">${esc(c.titulo)}</p>
            <div class="flex gap-1 flex-shrink-0">
              <button onclick="editCard('${c.id}')" class="p-1.5 hover:bg-slate-100 rounded-lg transition-colors" title="Editar">
                <i data-lucide="pencil" class="w-3 h-3 text-slate-400"></i>
              </button>
              <button onclick="deleteCard('${c.id}','${esc(c.titulo)}')" class="p-1.5 hover:bg-red-50 rounded-lg transition-colors" title="Excluir">
                <i data-lucide="trash-2" class="w-3 h-3 text-slate-400 hover:text-red-500"></i>
              </button>
            </div>
          </div>
          <div class="flex flex-wrap gap-1.5 mb-3">
            <span class="badge ${TIPO_BADGE[c.tipo] || 'bg-slate-100 text-slate-600'}">${TIPO_LABEL[c.tipo] || c.tipo}</span>
          </div>
          ${c.descricao ? `<p class="text-xs text-slate-500 mb-2 line-clamp-2">${esc(c.descricao)}</p>` : ''}
          <div class="flex items-center justify-between mt-2 pt-2 border-t border-slate-50">
            <span class="text-[10px] text-slate-400">${c.responsavel ? '👤 ' + esc(c.responsavel) : ''}</span>
            <span class="text-[10px] text-slate-400">${c.previsao || ''}</span>
          </div>
          <div class="mt-1.5 pt-1.5 border-t border-slate-50">
            <p class="text-[9px] text-slate-300">por ${esc(c.criado_por)} · ${formatDate(c.criado_em)}</p>
            ${c.atualizado_por ? `<p class="text-[9px] text-slate-300">editado por ${esc(c.atualizado_por)} · ${formatDate(c.atualizado_em)}</p>` : ''}
          </div>
        </div>`).join('')}
        <button onclick="openCardModal('${col.id}')" class="w-full py-2 border border-dashed border-slate-200 rounded-xl text-xs text-slate-400 hover:border-blue-300 hover:text-blue-500 transition-all">
          + Adicionar
        </button>
      </div>
    </div>`;
  }).join('');
  lucide.createIcons();
}

async function loadCards() {
  const q = query(collection(db, 'hub_roadmap'), orderBy('criado_em', 'desc'));
  onSnapshot(q, snap => {
    allCards = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    document.getElementById('kanban-loading').classList.add('hidden');
    document.getElementById('kanban-board').classList.remove('hidden');
    document.getElementById('kanban-board').classList.add('grid');
    renderKanban();
  });
}

// Modal card
window.openCardModal = function(colId) {
  editingCardId = null;
  document.getElementById('card-modal-title').textContent = 'Novo item';
  document.getElementById('save-card-txt').textContent = 'Salvar';
  ['c-title','c-responsavel','c-previsao','c-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('c-tipo').value = 'sugestao';
  document.getElementById('c-status').value = colId || 'sugerido';
  document.getElementById('card-modal').classList.replace('hidden','flex');
};

window.closeCardModal = function() {
  document.getElementById('card-modal').classList.replace('flex','hidden');
};

window.editCard = function(id) {
  const c = allCards.find(x => x.id === id);
  if (!c) return;
  editingCardId = id;
  document.getElementById('card-modal-title').textContent = 'Editar item';
  document.getElementById('save-card-txt').textContent = 'Atualizar';
  document.getElementById('c-title').value = c.titulo || '';
  document.getElementById('c-tipo').value = c.tipo || 'sugestao';
  document.getElementById('c-status').value = c.status || 'sugerido';
  document.getElementById('c-responsavel').value = c.responsavel || '';
  document.getElementById('c-previsao').value = c.previsao || '';
  document.getElementById('c-desc').value = c.descricao || '';
  document.getElementById('card-modal').classList.replace('hidden','flex');
};

window.saveCard = async function() {
  const titulo = document.getElementById('c-title').value.trim();
  if (!titulo) return alert('Preencha o título.');
  const btn = document.getElementById('save-card-btn');
  btn.disabled = true;

  const data = {
    titulo,
    tipo:        document.getElementById('c-tipo').value,
    status:      document.getElementById('c-status').value,
    responsavel: document.getElementById('c-responsavel').value.trim(),
    previsao:    document.getElementById('c-previsao').value,
    descricao:   document.getElementById('c-desc').value.trim(),
  };

  try {
    if (editingCardId) {
      const old = allCards.find(x => x.id === editingCardId);
      const changes = [];
      for (const k of Object.keys(data)) {
        if (old[k] !== data[k]) changes.push({ campo: k, anterior: old[k], novo: data[k] });
      }
      await updateDoc(doc(db, 'hub_roadmap', editingCardId), {
        ...data, atualizado_por: currentUser.name, atualizado_em: serverTimestamp()
      });
      for (const ch of changes) {
        await addLog('roadmap', 'editou', editingCardId, titulo, ch.campo, ch.anterior, ch.novo);
      }
    } else {
      const ref = await addDoc(collection(db, 'hub_roadmap'), {
        ...data, criado_por: currentUser.name, criado_por_email: currentUser.email, criado_em: serverTimestamp()
      });
      await addLog('roadmap', 'criou', ref.id, titulo);
    }
    closeCardModal();
  } catch(e) { alert('Erro: ' + e.message); }
  btn.disabled = false;
};

window.deleteCard = async function(id, titulo) {
  if (!confirm(`Excluir "${titulo}"?`)) return;
  await deleteDoc(doc(db, 'hub_roadmap', id));
  await addLog('roadmap', 'excluiu', id, titulo);
};

// ─── PROMPTS ─────────────────────────────────────────────────────────────────
let allPrompts = [];
let editingPromptId = null;

function renderPrompts() {
  const list = document.getElementById('prompts-list');
  list.innerHTML = allPrompts.map(p => `
    <div class="prompt-row glass p-6 border border-slate-200">
      <div class="flex items-start justify-between gap-4">
        <div class="flex-1">
          <div class="flex items-center gap-2 mb-1 flex-wrap">
            <span class="font-bold text-sm text-slate-800">${esc(p.nome)}</span>
            <span class="badge ${STATUS_BADGE[p.status] || 'bg-slate-100 text-slate-600'}">${STATUS_LABEL[p.status] || p.status}</span>
          </div>
          <code class="text-[10px] text-slate-400 font-mono">${esc(p.chave)}</code>
          ${p.descricao ? `<p class="text-xs text-slate-500 mt-1">${esc(p.descricao)}</p>` : ''}
        </div>
        <div class="flex gap-1 flex-shrink-0">
          <button onclick="editPrompt('${p.id}')" class="p-2 hover:bg-slate-100 rounded-xl transition-colors" title="Editar">
            <i data-lucide="pencil" class="w-4 h-4 text-slate-400"></i>
          </button>
          <button onclick="deletePrompt('${p.id}','${esc(p.nome)}')" class="p-2 hover:bg-red-50 rounded-xl transition-colors" title="Excluir">
            <i data-lucide="trash-2" class="w-4 h-4 text-slate-400 hover:text-red-500"></i>
          </button>
        </div>
      </div>
      <details class="mt-3">
        <summary class="text-xs font-bold text-blue-600 cursor-pointer select-none hover:text-blue-800">Ver conteúdo completo</summary>
        <pre class="mt-3 p-4 bg-slate-50 rounded-xl text-[11px] text-slate-600 whitespace-pre-wrap leading-relaxed border border-slate-100 font-mono">${esc(p.conteudo)}</pre>
      </details>
      <div class="mt-3 pt-3 border-t border-slate-50 flex flex-wrap gap-x-4 gap-y-0.5">
        <p class="text-[10px] text-slate-300">criado por ${esc(p.criado_por)} · ${formatDate(p.criado_em)}</p>
        ${p.atualizado_por ? `<p class="text-[10px] text-slate-300">editado por ${esc(p.atualizado_por)} · ${formatDate(p.atualizado_em)}</p>` : ''}
      </div>
    </div>`).join('');
  lucide.createIcons();
}

async function loadPrompts() {
  const q = query(collection(db, 'hub_prompts'), orderBy('criado_em', 'asc'));
  onSnapshot(q, snap => {
    allPrompts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    document.getElementById('prompts-loading').classList.add('hidden');
    document.getElementById('prompts-list').classList.remove('hidden');
    renderPrompts();
  });
}

window.openPromptModal = function() {
  editingPromptId = null;
  document.getElementById('prompt-modal-title').textContent = 'Novo prompt';
  document.getElementById('save-prompt-txt').textContent = 'Salvar';
  ['p-nome','p-chave','p-desc','p-conteudo'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('p-status').value = 'ativo';
  document.getElementById('prompt-modal').classList.replace('hidden','flex');
};

window.closePromptModal = function() {
  document.getElementById('prompt-modal').classList.replace('flex','hidden');
};

window.editPrompt = function(id) {
  const p = allPrompts.find(x => x.id === id);
  if (!p) return;
  editingPromptId = id;
  document.getElementById('prompt-modal-title').textContent = 'Editar prompt';
  document.getElementById('save-prompt-txt').textContent = 'Atualizar';
  document.getElementById('p-nome').value    = p.nome || '';
  document.getElementById('p-chave').value   = p.chave || '';
  document.getElementById('p-desc').value    = p.descricao || '';
  document.getElementById('p-conteudo').value = p.conteudo || '';
  document.getElementById('p-status').value  = p.status || 'ativo';
  document.getElementById('prompt-modal').classList.replace('hidden','flex');
};

window.savePrompt = async function() {
  const nome    = document.getElementById('p-nome').value.trim();
  const chave   = document.getElementById('p-chave').value.trim();
  const conteudo = document.getElementById('p-conteudo').value.trim();
  if (!nome || !chave || !conteudo) return alert('Nome, chave e conteúdo são obrigatórios.');
  const btn = document.getElementById('save-prompt-btn');
  btn.disabled = true;

  const data = {
    nome, chave, conteudo,
    descricao: document.getElementById('p-desc').value.trim(),
    status:    document.getElementById('p-status').value,
  };

  try {
    if (editingPromptId) {
      const old = allPrompts.find(x => x.id === editingPromptId);
      const changes = [];
      for (const k of Object.keys(data)) {
        if (old[k] !== data[k]) changes.push({ campo: k, anterior: old[k], novo: data[k] });
      }
      await updateDoc(doc(db, 'hub_prompts', editingPromptId), {
        ...data, atualizado_por: currentUser.name, atualizado_em: serverTimestamp()
      });
      for (const ch of changes) {
        await addLog('prompt', 'editou', editingPromptId, nome, ch.campo, ch.anterior, ch.novo);
      }
    } else {
      const ref = await addDoc(collection(db, 'hub_prompts'), {
        ...data, criado_por: currentUser.name, criado_por_email: currentUser.email, criado_em: serverTimestamp()
      });
      await addLog('prompt', 'criou', ref.id, nome);
    }
    closePromptModal();
  } catch(e) { alert('Erro: ' + e.message); }
  btn.disabled = false;
};

window.deletePrompt = async function(id, nome) {
  if (!confirm(`Excluir prompt "${nome}"?`)) return;
  await deleteDoc(doc(db, 'hub_prompts', id));
  await addLog('prompt', 'excluiu', id, nome);
};

// ─── LOGS ────────────────────────────────────────────────────────────────────
let allLogs = [];

const ACAO_LABEL = { criou: '✅ Criou', editou: '✏️ Editou', excluiu: '🗑️ Excluiu' };
const ACAO_COLOR = {
  criou:   'bg-emerald-100 text-emerald-700',
  editou:  'bg-blue-100 text-blue-700',
  excluiu: 'bg-red-100 text-red-700',
};
const CAMPO_LABEL = {
  titulo:'Título', tipo:'Tipo', status:'Status', descricao:'Descrição',
  responsavel:'Responsável', previsao:'Previsão', nome:'Nome', chave:'Chave',
  conteudo:'Conteúdo', descricao:'Descrição'
};

function renderLogs(logs) {
  const list = document.getElementById('logs-list');
  if (!logs.length) {
    list.innerHTML = '<p class="text-center text-slate-400 py-10 text-sm">Nenhuma atividade registrada ainda.</p>';
    return;
  }
  list.innerHTML = logs.map(l => `
    <div class="log-entry flex items-start gap-4 px-6 py-4 hover:bg-slate-50 transition-colors">
      <div class="flex-shrink-0 w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-sm font-bold text-slate-600">
        ${(l.feito_por || '?')[0].toUpperCase()}
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 flex-wrap">
          <span class="text-sm font-bold text-slate-800">${esc(l.feito_por || 'Anônimo')}</span>
          <span class="badge ${ACAO_COLOR[l.acao] || 'bg-slate-100 text-slate-600'}">${ACAO_LABEL[l.acao] || l.acao}</span>
          <span class="text-xs text-slate-400">${l.tipo === 'roadmap' ? '📋 Roadmap' : '🧠 Prompt'}</span>
        </div>
        <p class="text-sm text-slate-600 mt-0.5 truncate">${esc(l.itemTitulo || '')}</p>
        ${l.campo ? `
          <div class="mt-1.5 p-2 bg-slate-50 rounded-lg text-xs">
            <span class="font-bold text-slate-500">${CAMPO_LABEL[l.campo] || l.campo}:</span>
            <span class="text-red-500 line-through ml-1">${esc(l.anterior || '—')}</span>
            <span class="mx-1 text-slate-300">→</span>
            <span class="text-emerald-600">${esc(l.novo || '—')}</span>
          </div>` : ''}
      </div>
      <span class="text-[10px] text-slate-300 flex-shrink-0">${formatDate(l.feito_em)}</span>
    </div>`).join('');
}

async function loadLogs() {
  const q = query(collection(db, 'hub_logs'), orderBy('feito_em', 'desc'));
  onSnapshot(q, snap => {
    allLogs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    document.getElementById('logs-loading').classList.add('hidden');
    document.getElementById('logs-list').classList.remove('hidden');
    filterLogs();
  });
}

window.filterLogs = function() {
  const f = document.getElementById('log-filter').value;
  const filtered = f === 'todos' ? allLogs : allLogs.filter(l => l.tipo === f);
  renderLogs(filtered);
  lucide.createIcons();
};

// ─── Helpers ──────────────────────────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit' });
}

// ─── Tabs ─────────────────────────────────────────────────────────────────────
window.switchTab = function(id) {
  ['roadmap','prompts','logs'].forEach(t => {
    document.getElementById('section-' + t).classList.add('hidden');
    document.getElementById('tab-' + t).classList.remove('active');
    document.getElementById('tab-' + t).classList.add('text-slate-500');
  });
  document.getElementById('section-' + id).classList.remove('hidden');
  document.getElementById('tab-' + id).classList.add('active');
  document.getElementById('tab-' + id).classList.remove('text-slate-500');
};

// ─── Fechar modal clicando fora ───────────────────────────────────────────────
document.getElementById('card-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeCardModal();
});
document.getElementById('prompt-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closePromptModal();
});

// ─── Init ─────────────────────────────────────────────────────────────────────
await loadSession();
loadCards();
loadPrompts();
loadLogs();

lucide.createIcons();
</script>
