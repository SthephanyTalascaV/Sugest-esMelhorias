<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nibo CS Auditor — Hub dos Coordenadores</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; color: #0f172a; }
  .glass { background: white; border: 1px solid #e2e8f0; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
  .tab-btn { transition: all .2s; }
  .tab-btn.active { background: #002d72; color: white; }
  .card-item { transition: all .2s; }
  .card-item:hover { transform: translateY(-2px); box-shadow: 0 8px 16px -4px rgba(0,0,0,0.1); }
  .log-entry:not(:last-child) { border-bottom: 1px solid #f1f5f9; }
  @keyframes fadeIn { from { opacity:0; transform:scale(.97); } to { opacity:1; transform:scale(1); } }
  .modal-box { animation: fadeIn .15s ease; }
  .badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 99px; }
  select { background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat:no-repeat; background-position:right .5rem center; background-size:1.2em; padding-right:2.2rem; }
  .spinner { width:20px; height:20px; border:2px solid #e2e8f0; border-top-color:#002d72; border-radius:50%; animation:spin .6s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .card-item[draggable="true"] { cursor: grab; }
  .card-item[draggable="true"]:active { cursor: grabbing; }
  .card-item.dragging { opacity: 0.35; transform: scale(0.97); box-shadow: none; }
  .kanban-col.drop-over { outline: 2px dashed #3b82f6; outline-offset: 2px; border-radius: 0.75rem; background-color: rgba(59,130,246,0.06); }
</style>
</head>
<body class="min-h-screen pb-16">

<!-- ══ TELA DE LOGIN ══ -->
<div id="login-screen" class="min-h-screen flex items-center justify-center">
  <div class="glass p-12 w-full max-w-sm mx-4 text-center">
    <div class="bg-[#002d72] w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6">
      <i data-lucide="bot" class="text-white w-8 h-8"></i>
    </div>
    <h1 class="font-extrabold text-xl text-[#002d72] mb-1">Nibo CS Auditor</h1>
    <p class="text-xs text-slate-400 uppercase tracking-widest mb-8">Hub dos Coordenadores</p>
    <p id="login-error" class="hidden text-xs text-red-500 bg-red-50 rounded-xl p-3 mb-4"></p>
    <button onclick="loginWithGoogle()" id="login-btn"
      class="w-full flex items-center justify-center gap-3 border border-slate-200 hover:border-blue-300 bg-white hover:bg-blue-50 text-slate-700 font-bold py-3 px-6 rounded-xl transition-all active:scale-95">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 01-7.18-2.54H1.83v2.07A8 8 0 008.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 010-3.04V5.41H1.83a8 8 0 000 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 001.83 5.4L4.5 7.49a4.77 4.77 0 014.48-3.31z"/></svg>
      Entrar com Google
    </button>
    <p class="text-[10px] text-slate-300 mt-4">Restrito a contas @nibo.com.br</p>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app-screen" class="hidden">

  <nav class="bg-[#002d72] text-white px-6 py-4 sticky top-0 z-40 shadow-xl">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="bg-white p-2 rounded-xl"><i data-lucide="bot" class="text-[#002d72] w-5 h-5"></i></div>
        <div>
          <div class="font-extrabold text-sm uppercase tracking-tight">Nibo <span class="text-blue-300">CS Auditor</span></div>
          <div class="text-[9px] text-blue-200 uppercase tracking-widest">Hub dos Coordenadores</div>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <img id="user-avatar" src="" class="hidden w-8 h-8 rounded-full border-2 border-blue-300" />
        <span id="user-name" class="text-sm text-blue-200 hidden md:block"></span>
        <button onclick="logout()" class="text-[10px] text-blue-300 hover:text-white border border-blue-400/40 hover:border-blue-300 px-3 py-1.5 rounded-lg transition-all">Sair</button>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 mt-6">

    <div class="flex gap-2 mb-6 bg-white rounded-2xl p-1.5 border border-slate-200 w-fit shadow-sm">
      <button id="tab-roadmap" class="tab-btn active px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2" onclick="switchTab('roadmap')">
        <i data-lucide="kanban" class="w-4 h-4"></i> Roadmap & Feedbacks
      </button>
      <button id="tab-prompts" class="tab-btn px-5 py-2.5 rounded-xl text-sm font-bold text-slate-500 flex items-center gap-2" onclick="switchTab('prompts')">
        <i data-lucide="brain" class="w-4 h-4"></i> Prompts de Avaliação
      </button>
      <button id="tab-logs" class="tab-btn px-5 py-2.5 rounded-xl text-sm font-bold text-slate-500 flex items-center gap-2" onclick="switchTab('logs')">
        <i data-lucide="history" class="w-4 h-4"></i> Histórico
      </button>
    </div>

    <!-- ROADMAP -->
    <div id="section-roadmap">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-extrabold text-lg text-slate-800">Roadmap & Feedbacks</h2>
        <button onclick="openCardModal()" class="flex items-center gap-2 bg-[#002d72] hover:bg-blue-800 text-white px-4 py-2.5 rounded-xl text-sm font-bold transition-all active:scale-95">
          <i data-lucide="plus" class="w-4 h-4"></i> Novo item
        </button>
      </div>
      <div id="kanban-loading" class="flex justify-center py-16"><div class="spinner"></div></div>
      <div id="kanban-board" class="hidden grid grid-cols-1 md:grid-cols-4 gap-4"></div>
    </div>

    <!-- PROMPTS -->
    <div id="section-prompts" class="hidden">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-extrabold text-lg text-slate-800">Prompts de Avaliação</h2>
        <button onclick="openPromptModal()" class="flex items-center gap-2 bg-[#002d72] hover:bg-blue-800 text-white px-4 py-2.5 rounded-xl text-sm font-bold transition-all active:scale-95">
          <i data-lucide="plus" class="w-4 h-4"></i> Novo prompt
        </button>
      </div>
      <div id="prompts-loading" class="flex justify-center py-16"><div class="spinner"></div></div>
      <div id="prompts-list" class="hidden space-y-3"></div>
    </div>

    <!-- LOGS -->
    <div id="section-logs" class="hidden">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-extrabold text-lg text-slate-800">Histórico de Alterações</h2>
        <select id="log-filter" onchange="filterLogs()" class="text-sm border border-slate-200 rounded-xl px-3 py-2 bg-white focus:outline-none focus:ring-2 ring-blue-300">
          <option value="todos">Todos</option>
          <option value="roadmap">Roadmap</option>
          <option value="prompt">Prompts</option>
        </select>
      </div>
      <div id="logs-loading" class="flex justify-center py-16"><div class="spinner"></div></div>
      <div id="logs-list" class="hidden glass overflow-hidden"></div>
    </div>

  </main>
</div>

<!-- MODAL CARD -->
<div id="card-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/40 backdrop-blur-sm">
  <div class="modal-box glass p-8 w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto">
    <div class="flex justify-between items-center mb-6">
      <h3 id="card-modal-title" class="font-extrabold text-lg text-[#002d72]">Novo item</h3>
      <button onclick="closeCardModal()" class="p-2 hover:bg-slate-100 rounded-full"><i data-lucide="x" class="w-4 h-4"></i></button>
    </div>
    <div class="space-y-4">
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">Título *</label>
        <input id="c-title" type="text" placeholder="Descreva o item..." class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 ring-blue-300">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">Tipo *</label>
          <select id="c-tipo" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none focus:ring-2 ring-blue-300 appearance-none">
            <option value="bug">🐛 Bug</option>
            <option value="sugestao">💡 Sugestão de Melhoria</option>
            <option value="feature">✨ Nova Funcionalidade</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">Status</label>
          <select id="c-status" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none focus:ring-2 ring-blue-300 appearance-none">
            <option value="sugerido">📥 Sugerido</option>
            <option value="mapeamento">🔍 Em Mapeamento</option>
            <option value="andamento">🔨 Em Andamento</option>
            <option value="concluido">✅ Concluído</option>
          </select>
        </div>
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">Responsável pela entrega</label>
        <input id="c-responsavel" type="text" placeholder="Nome de quem vai implementar..." class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 ring-blue-300">
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">Previsão de entrega</label>
        <input id="c-previsao" type="date" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 ring-blue-300">
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">Descrição</label>
        <textarea id="c-desc" rows="3" placeholder="Contexto adicional, passos para reproduzir, etc..." class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 ring-blue-300 resize-none"></textarea>
      </div>
    </div>
    <div class="flex justify-end gap-3 mt-6">
      <button onclick="closeCardModal()" class="px-4 py-2.5 border border-slate-200 rounded-xl text-sm font-bold text-slate-500 hover:bg-slate-50">Cancelar</button>
      <button onclick="saveCard()" id="save-card-btn" class="bg-[#002d72] hover:bg-blue-800 text-white px-6 py-2.5 rounded-xl text-sm font-bold transition-all active:scale-95 disabled:opacity-50">
        <span id="save-card-txt">Salvar</span>
      </button>
    </div>
  </div>
</div>

<!-- MODAL PROMPT -->
<div id="prompt-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/40 backdrop-blur-sm">
  <div class="modal-box glass p-8 w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto">
    <div class="flex justify-between items-center mb-6">
      <h3 id="prompt-modal-title" class="font-extrabold text-lg text-[#002d72]">Novo prompt</h3>
      <button onclick="closePromptModal()" class="p-2 hover:bg-slate-100 rounded-full"><i data-lucide="x" class="w-4 h-4"></i></button>
    </div>
    <div class="space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">Nome *</label>
          <input id="p-nome" type="text" placeholder="Ex: Instrução de tom de voz" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 ring-blue-300">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">Chave técnica *</label>
          <input id="p-chave" type="text" placeholder="Ex: instrucao_tom_voz" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm font-mono focus:outline-none focus:ring-2 ring-blue-300">
        </div>
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">Descrição</label>
        <input id="p-desc" type="text" placeholder="Para que serve este prompt..." class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 ring-blue-300">
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">Conteúdo do Prompt *</label>
        <textarea id="p-conteudo" rows="7" placeholder="Texto completo que será enviado ao Gemini..." class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 ring-blue-300 resize-none font-mono text-xs"></textarea>
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">Status</label>
        <select id="p-status" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none focus:ring-2 ring-blue-300 appearance-none">
          <option value="ativo">✅ Ativo</option>
          <option value="teste">🧪 Em Teste</option>
          <option value="inativo">🚫 Inativo</option>
        </select>
      </div>
    </div>
    <div class="flex justify-end gap-3 mt-6">
      <button onclick="closePromptModal()" class="px-4 py-2.5 border border-slate-200 rounded-xl text-sm font-bold text-slate-500 hover:bg-slate-50">Cancelar</button>
      <button onclick="savePrompt()" id="save-prompt-btn" class="bg-[#002d72] hover:bg-blue-800 text-white px-6 py-2.5 rounded-xl text-sm font-bold transition-all active:scale-95 disabled:opacity-50">
        <span id="save-prompt-txt">Salvar</span>
      </button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp }      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
                              from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc,
         query, orderBy, serverTimestamp, onSnapshot }
                              from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app  = initializeApp({
  apiKey:            "AIzaSyBkC8n5mzSPZnHwXf5d-jNdZvy-esPkD8Q",
  authDomain:        "gen-lang-client-0237314662.firebaseapp.com",
  projectId:         "gen-lang-client-0237314662",
  storageBucket:     "gen-lang-client-0237314662.firebasestorage.app",
  messagingSenderId: "279936452839",
  appId:             "1:279936452839:web:8a7e6824724c49388eba42"
});
const auth = getAuth(app);
const db   = getFirestore(app);

// ── Auth ──────────────────────────────────────────────────────────────────────
let currentUser = null;
let unsubCards, unsubPrompts, unsubLogs;

window.loginWithGoogle = async function() {
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');
  btn.disabled = true;
  err.classList.add('hidden');
  try {
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ hd: 'nibo.com.br' });
    const result = await signInWithPopup(auth, provider);
    if (!result.user.email.endsWith('@nibo.com.br')) {
      await signOut(auth);
      err.textContent = `Acesso negado. Use uma conta @nibo.com.br (você entrou com ${result.user.email}).`;
      err.classList.remove('hidden');
    }
  } catch(e) {
    if (e.code !== 'auth/popup-closed-by-user') {
      err.textContent = 'Erro ao fazer login: ' + e.message;
      err.classList.remove('hidden');
    }
  }
  btn.disabled = false;
};

window.logout = async function() {
  [unsubCards, unsubPrompts, unsubLogs].forEach(u => u && u());
  await signOut(auth);
};

onAuthStateChanged(auth, user => {
  if (user && user.email.endsWith('@nibo.com.br')) {
    currentUser = { name: user.displayName || user.email, email: user.email, photo: user.photoURL };
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app-screen').classList.remove('hidden');
    document.getElementById('user-name').textContent = currentUser.name;
    document.getElementById('user-name').classList.remove('hidden');
    if (currentUser.photo) {
      const img = document.getElementById('user-avatar');
      img.src = currentUser.photo; img.classList.remove('hidden');
    }
    initListeners();
    lucide.createIcons();
  } else {
    currentUser = null;
    document.getElementById('app-screen').classList.add('hidden');
    document.getElementById('login-screen').classList.remove('hidden');
    lucide.createIcons();
  }
});

// ── Log helper ────────────────────────────────────────────────────────────────
async function addLog(tipo, acao, itemId, itemTitulo, campo, anterior, novo) {
  await addDoc(collection(db, 'hub_logs'), {
    tipo, acao, itemId, itemTitulo,
    campo: campo || null, anterior: anterior || null, novo: novo || null,
    feito_por: currentUser.name, feito_por_email: currentUser.email,
    feito_em: serverTimestamp()
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const esc = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
const fmtDate = ts => {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
};

// ── Constantes ────────────────────────────────────────────────────────────────
const COLS = [
  { id:'sugerido',   label:'Sugerido',      icon:'📥', badge:'bg-slate-100 text-slate-600',    bg:'bg-slate-50'   },
  { id:'mapeamento', label:'Em Mapeamento', icon:'🔍', badge:'bg-amber-100 text-amber-700',    bg:'bg-amber-50'   },
  { id:'andamento',  label:'Em Andamento',  icon:'🔨', badge:'bg-blue-100 text-blue-700',      bg:'bg-blue-50'    },
  { id:'concluido',  label:'Concluído',     icon:'✅', badge:'bg-emerald-100 text-emerald-700', bg:'bg-emerald-50' },
];
const TIPO_BADGE  = { bug:'bg-red-100 text-red-700', sugestao:'bg-blue-100 text-blue-700', feature:'bg-purple-100 text-purple-700' };
const TIPO_LABEL  = { bug:'🐛 Bug', sugestao:'💡 Sugestão', feature:'✨ Feature' };
const STATUS_BADGE = { ativo:'bg-emerald-100 text-emerald-700', teste:'bg-amber-100 text-amber-700', inativo:'bg-red-100 text-red-700' };
const STATUS_LABEL = { ativo:'✅ Ativo', teste:'🧪 Em Teste', inativo:'🚫 Inativo' };
const CAMPO_PT = { titulo:'Título', tipo:'Tipo', status:'Status', descricao:'Descrição', responsavel:'Responsável', previsao:'Previsão', nome:'Nome', chave:'Chave', conteudo:'Conteúdo' };
const ACAO_COLOR = { criou:'bg-emerald-100 text-emerald-700', editou:'bg-blue-100 text-blue-700', excluiu:'bg-red-100 text-red-700' };
const ACAO_LABEL_MAP = { criou:'✅ Criou', editou:'✏️ Editou', excluiu:'🗑️ Excluiu' };

// ── KANBAN ────────────────────────────────────────────────────────────────────
let allCards = [];
let editingCardId = null;

function renderKanban() {
  document.getElementById('kanban-board').innerHTML = COLS.map(col => {
    const cards = allCards.filter(c => c.status === col.id);
    return `<div class="glass p-4 ${col.bg}">
      <div class="flex items-center justify-between mb-3 pb-3 border-b border-slate-100">
        <span class="text-xs font-black uppercase tracking-wider text-slate-500">${col.icon} ${col.label}</span>
        <span class="badge ${col.badge}">${cards.length}</span>
      </div>
      <div class="kanban-col space-y-3 min-h-[60px]"
           ondragover="kanbanDragOver(event)"
           ondragleave="kanbanDragLeave(event)"
           ondrop="kanbanDrop(event,'${col.id}')">
        ${cards.map(c => `
        <div class="card-item bg-white border border-slate-200 rounded-xl p-4 shadow-sm"
             draggable="true"
             ondragstart="kanbanDragStart(event,'${c.id}')"
             ondragend="kanbanDragEnd(event)">
          <div class="flex items-start justify-between gap-2 mb-2">
            <p class="text-sm font-semibold text-slate-800 leading-snug flex-1">${esc(c.titulo)}</p>
            <div class="flex gap-1 flex-shrink-0">
              <button onclick="editCard('${c.id}')" class="p-1.5 hover:bg-slate-100 rounded-lg" title="Editar"><i data-lucide="pencil" class="w-3 h-3 text-slate-400"></i></button>
              <button onclick="deleteCard('${c.id}','${esc(c.titulo)}')" class="p-1.5 hover:bg-red-50 rounded-lg" title="Excluir"><i data-lucide="trash-2" class="w-3 h-3 text-slate-400"></i></button>
            </div>
          </div>
          <span class="badge ${TIPO_BADGE[c.tipo]||'bg-slate-100 text-slate-600'}">${TIPO_LABEL[c.tipo]||c.tipo}</span>
          ${c.descricao ? `<p class="text-xs text-slate-500 mt-2 line-clamp-2">${esc(c.descricao)}</p>` : ''}
          <div class="flex items-center justify-between mt-2 pt-2 border-t border-slate-50 text-[10px] text-slate-400">
            <span>${c.responsavel?'👤 '+esc(c.responsavel):''}</span>
            <span>${c.previsao?'📅 '+c.previsao:''}</span>
          </div>
          <div class="mt-1.5 pt-1.5 border-t border-slate-50 space-y-0.5">
            <p class="text-[9px] text-slate-300">criado por <b>${esc(c.criado_por)}</b> · ${fmtDate(c.criado_em)}</p>
            ${c.atualizado_por?`<p class="text-[9px] text-slate-300">editado por <b>${esc(c.atualizado_por)}</b> · ${fmtDate(c.atualizado_em)}</p>`:''}
          </div>
        </div>`).join('')}
        <button onclick="openCardModal('${col.id}')" class="w-full py-2 border border-dashed border-slate-200 rounded-xl text-xs text-slate-400 hover:border-blue-300 hover:text-blue-500 transition-all">+ Adicionar</button>
      </div>
    </div>`;
  }).join('');
  lucide.createIcons();
}

window.openCardModal = function(colId) {
  editingCardId = null;
  document.getElementById('card-modal-title').textContent = 'Novo item';
  document.getElementById('save-card-txt').textContent = 'Salvar';
  ['c-title','c-responsavel','c-previsao','c-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('c-tipo').value   = 'sugestao';
  document.getElementById('c-status').value = colId || 'sugerido';
  document.getElementById('card-modal').classList.replace('hidden','flex');
};
window.closeCardModal = () => document.getElementById('card-modal').classList.replace('flex','hidden');

window.editCard = function(id) {
  const c = allCards.find(x => x.id === id); if (!c) return;
  editingCardId = id;
  document.getElementById('card-modal-title').textContent = 'Editar item';
  document.getElementById('save-card-txt').textContent = 'Atualizar';
  document.getElementById('c-title').value       = c.titulo      || '';
  document.getElementById('c-tipo').value        = c.tipo        || 'sugestao';
  document.getElementById('c-status').value      = c.status      || 'sugerido';
  document.getElementById('c-responsavel').value = c.responsavel || '';
  document.getElementById('c-previsao').value    = c.previsao    || '';
  document.getElementById('c-desc').value        = c.descricao   || '';
  document.getElementById('card-modal').classList.replace('hidden','flex');
};

window.saveCard = async function() {
  const titulo = document.getElementById('c-title').value.trim();
  if (!titulo) return alert('Preencha o título.');
  const btn = document.getElementById('save-card-btn'); btn.disabled = true;
  const data = {
    titulo, tipo: document.getElementById('c-tipo').value, status: document.getElementById('c-status').value,
    responsavel: document.getElementById('c-responsavel').value.trim(),
    previsao: document.getElementById('c-previsao').value,
    descricao: document.getElementById('c-desc').value.trim(),
  };
  try {
    if (editingCardId) {
      const old = allCards.find(x => x.id === editingCardId) || {};
      await updateDoc(doc(db,'hub_roadmap',editingCardId), { ...data, atualizado_por: currentUser.name, atualizado_por_email: currentUser.email, atualizado_em: serverTimestamp() });
      for (const k of Object.keys(data))
        if (String(old[k]||'') !== String(data[k]||'')) await addLog('roadmap','editou',editingCardId,titulo,k,old[k],data[k]);
    } else {
      const ref = await addDoc(collection(db,'hub_roadmap'), { ...data, criado_por: currentUser.name, criado_por_email: currentUser.email, criado_em: serverTimestamp() });
      await addLog('roadmap','criou',ref.id,titulo);
    }
    closeCardModal();
  } catch(e) { alert('Erro: '+e.message); }
  btn.disabled = false;
};

window.deleteCard = async function(id, titulo) {
  if (!confirm(`Excluir "${titulo}"?`)) return;
  await deleteDoc(doc(db,'hub_roadmap',id));
  await addLog('roadmap','excluiu',id,titulo);
};

// ── PROMPTS ───────────────────────────────────────────────────────────────────
let allPrompts = [];
let editingPromptId = null;

function renderPrompts() {
  const list = document.getElementById('prompts-list');
  if (!allPrompts.length) { list.innerHTML = '<p class="text-center text-slate-400 py-12 text-sm">Nenhum prompt cadastrado ainda.</p>'; return; }
  list.innerHTML = allPrompts.map(p => `
    <div class="glass p-6 border border-slate-200 hover:border-blue-200 transition-colors">
      <div class="flex items-start justify-between gap-4">
        <div class="flex-1">
          <div class="flex items-center gap-2 flex-wrap mb-1">
            <span class="font-bold text-sm text-slate-800">${esc(p.nome)}</span>
            <span class="badge ${STATUS_BADGE[p.status]||'bg-slate-100 text-slate-600'}">${STATUS_LABEL[p.status]||p.status}</span>
          </div>
          <code class="text-[10px] text-slate-400 font-mono bg-slate-50 px-2 py-0.5 rounded">${esc(p.chave)}</code>
          ${p.descricao?`<p class="text-xs text-slate-500 mt-1.5">${esc(p.descricao)}</p>`:''}
        </div>
        <div class="flex gap-1 flex-shrink-0">
          <button onclick="editPrompt('${p.id}')" class="p-2 hover:bg-slate-100 rounded-xl" title="Editar"><i data-lucide="pencil" class="w-4 h-4 text-slate-400"></i></button>
          <button onclick="deletePrompt('${p.id}','${esc(p.nome)}')" class="p-2 hover:bg-red-50 rounded-xl" title="Excluir"><i data-lucide="trash-2" class="w-4 h-4 text-slate-400"></i></button>
        </div>
      </div>
      <details class="mt-3">
        <summary class="text-xs font-bold text-blue-600 cursor-pointer select-none hover:text-blue-800">Ver conteúdo completo</summary>
        <pre class="mt-3 p-4 bg-slate-50 rounded-xl text-[11px] text-slate-600 whitespace-pre-wrap leading-relaxed border border-slate-100 font-mono overflow-x-auto">${esc(p.conteudo)}</pre>
      </details>
      <div class="mt-3 pt-3 border-t border-slate-50 flex flex-wrap gap-x-4">
        <p class="text-[10px] text-slate-300">criado por <b>${esc(p.criado_por)}</b> · ${fmtDate(p.criado_em)}</p>
        ${p.atualizado_por?`<p class="text-[10px] text-slate-300">editado por <b>${esc(p.atualizado_por)}</b> · ${fmtDate(p.atualizado_em)}</p>`:''}
      </div>
    </div>`).join('');
  lucide.createIcons();
}

window.openPromptModal = function() {
  editingPromptId = null;
  document.getElementById('prompt-modal-title').textContent = 'Novo prompt';
  document.getElementById('save-prompt-txt').textContent = 'Salvar';
  ['p-nome','p-chave','p-desc','p-conteudo'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('p-status').value = 'ativo';
  document.getElementById('prompt-modal').classList.replace('hidden','flex');
};
window.closePromptModal = () => document.getElementById('prompt-modal').classList.replace('flex','hidden');

window.editPrompt = function(id) {
  const p = allPrompts.find(x => x.id === id); if (!p) return;
  editingPromptId = id;
  document.getElementById('prompt-modal-title').textContent = 'Editar prompt';
  document.getElementById('save-prompt-txt').textContent = 'Atualizar';
  document.getElementById('p-nome').value     = p.nome      || '';
  document.getElementById('p-chave').value    = p.chave     || '';
  document.getElementById('p-desc').value     = p.descricao || '';
  document.getElementById('p-conteudo').value = p.conteudo  || '';
  document.getElementById('p-status').value   = p.status    || 'ativo';
  document.getElementById('prompt-modal').classList.replace('hidden','flex');
};

window.savePrompt = async function() {
  const nome = document.getElementById('p-nome').value.trim();
  const chave = document.getElementById('p-chave').value.trim();
  const conteudo = document.getElementById('p-conteudo').value.trim();
  if (!nome || !chave || !conteudo) return alert('Nome, chave e conteúdo são obrigatórios.');
  const btn = document.getElementById('save-prompt-btn'); btn.disabled = true;
  const data = { nome, chave, conteudo, descricao: document.getElementById('p-desc').value.trim(), status: document.getElementById('p-status').value };
  try {
    if (editingPromptId) {
      const old = allPrompts.find(x => x.id === editingPromptId) || {};
      await updateDoc(doc(db,'hub_prompts',editingPromptId), { ...data, atualizado_por: currentUser.name, atualizado_por_email: currentUser.email, atualizado_em: serverTimestamp() });
      for (const k of Object.keys(data))
        if (String(old[k]||'') !== String(data[k]||'')) await addLog('prompt','editou',editingPromptId,nome,k,old[k],data[k]);
    } else {
      const ref = await addDoc(collection(db,'hub_prompts'), { ...data, criado_por: currentUser.name, criado_por_email: currentUser.email, criado_em: serverTimestamp() });
      await addLog('prompt','criou',ref.id,nome);
    }
    closePromptModal();
  } catch(e) { alert('Erro: '+e.message); }
  btn.disabled = false;
};

window.deletePrompt = async function(id, nome) {
  if (!confirm(`Excluir prompt "${nome}"?`)) return;
  await deleteDoc(doc(db,'hub_prompts',id));
  await addLog('prompt','excluiu',id,nome);
};

// ── LOGS ──────────────────────────────────────────────────────────────────────
let allLogs = [];

function renderLogs(logs) {
  const list = document.getElementById('logs-list');
  if (!logs.length) { list.innerHTML = '<p class="text-center text-slate-400 py-10 text-sm">Nenhuma atividade registrada ainda.</p>'; return; }
  list.innerHTML = logs.map(l => `
    <div class="log-entry flex items-start gap-4 px-6 py-4 hover:bg-slate-50 transition-colors">
      <div class="flex-shrink-0 w-8 h-8 rounded-full bg-[#002d72] flex items-center justify-center text-xs font-bold text-white">
        ${(l.feito_por||'?')[0].toUpperCase()}
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 flex-wrap">
          <span class="text-sm font-bold text-slate-800">${esc(l.feito_por||'Anônimo')}</span>
          <span class="badge ${ACAO_COLOR[l.acao]||'bg-slate-100 text-slate-600'}">${ACAO_LABEL_MAP[l.acao]||l.acao}</span>
          <span class="text-xs text-slate-400">${l.tipo==='roadmap'?'📋 Roadmap':'🧠 Prompt'}</span>
        </div>
        <p class="text-sm text-slate-600 mt-0.5 font-medium truncate">${esc(l.itemTitulo||'')}</p>
        ${l.campo?`<div class="mt-1.5 p-2 bg-slate-50 rounded-lg text-xs border border-slate-100">
          <span class="font-bold text-slate-500">${CAMPO_PT[l.campo]||l.campo}:</span>
          <span class="text-red-400 line-through ml-1">${esc(l.anterior||'—')}</span>
          <span class="mx-1 text-slate-300">→</span>
          <span class="text-emerald-600 font-medium">${esc(l.novo||'—')}</span>
        </div>`:''}
      </div>
      <span class="text-[10px] text-slate-300 flex-shrink-0 mt-1">${fmtDate(l.feito_em)}</span>
    </div>`).join('');
}

window.filterLogs = function() {
  const f = document.getElementById('log-filter').value;
  renderLogs(f==='todos' ? allLogs : allLogs.filter(l => l.tipo===f));
};

// ── Drag & Drop Kanban ────────────────────────────────────────────────────────
let dragCardId = null;

window.kanbanDragStart = function(e, cardId) {
  dragCardId = cardId;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', cardId);
  setTimeout(() => e.target.closest('.card-item')?.classList.add('dragging'), 0);
};

window.kanbanDragEnd = function(e) {
  e.target.closest('.card-item')?.classList.remove('dragging');
  document.querySelectorAll('.kanban-col').forEach(c => c.classList.remove('drop-over'));
};

window.kanbanDragOver = function(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drop-over');
};

window.kanbanDragLeave = function(e) {
  if (!e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove('drop-over');
  }
};

window.kanbanDrop = async function(e, colId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drop-over');
  const id = dragCardId || e.dataTransfer.getData('text/plain');
  dragCardId = null;
  if (!id) return;
  const card = allCards.find(c => c.id === id);
  if (!card || card.status === colId) return;
  const oldStatus = card.status;
  try {
    await updateDoc(doc(db,'hub_roadmap',id), {
      status: colId,
      atualizado_por: currentUser.name,
      atualizado_por_email: currentUser.email,
      atualizado_em: serverTimestamp()
    });
    await addLog('roadmap','editou',id,card.titulo,'status',oldStatus,colId);
  } catch(err) { alert('Erro ao mover card: '+err.message); }
};

// ── Listeners realtime ────────────────────────────────────────────────────────
function initListeners() {
  unsubCards = onSnapshot(query(collection(db,'hub_roadmap'), orderBy('criado_em','desc')), snap => {
    allCards = snap.docs.map(d => ({id:d.id,...d.data()}));
    document.getElementById('kanban-loading').classList.add('hidden');
    const b = document.getElementById('kanban-board');
    b.classList.remove('hidden'); b.classList.add('grid');
    renderKanban();
  });
  unsubPrompts = onSnapshot(query(collection(db,'hub_prompts'), orderBy('criado_em','asc')), snap => {
    allPrompts = snap.docs.map(d => ({id:d.id,...d.data()}));
    document.getElementById('prompts-loading').classList.add('hidden');
    document.getElementById('prompts-list').classList.remove('hidden');
    renderPrompts();
  });
  unsubLogs = onSnapshot(query(collection(db,'hub_logs'), orderBy('feito_em','desc')), snap => {
    allLogs = snap.docs.map(d => ({id:d.id,...d.data()}));
    document.getElementById('logs-loading').classList.add('hidden');
    document.getElementById('logs-list').classList.remove('hidden');
    filterLogs();
  });
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
window.switchTab = function(id) {
  ['roadmap','prompts','logs'].forEach(t => {
    document.getElementById('section-'+t).classList.add('hidden');
    document.getElementById('tab-'+t).classList.remove('active');
    document.getElementById('tab-'+t).classList.add('text-slate-500');
  });
  document.getElementById('section-'+id).classList.remove('hidden');
  document.getElementById('tab-'+id).classList.add('active');
  document.getElementById('tab-'+id).classList.remove('text-slate-500');
};

['card-modal','prompt-modal'].forEach(id =>
  document.getElementById(id).addEventListener('click', e => {
    if (e.target===e.currentTarget) e.currentTarget.classList.replace('flex','hidden');
  })
);

lucide.createIcons();
</script>
